<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="5">
    <title>castzura status</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #222;
        }

        h1 {
            font-size: 1.2rem;
            border-bottom: 1px solid #ccc;
            padding-bottom: 0.3rem;
        }

        h2 {
            font-size: 1rem;
            margin-top: 1.5rem;
        }

        ul {
            padding-left: 1.2rem;
        }

        .log {
            background: #f5f5f5;
            padding: 0.6rem;
            height: 300px;
            overflow-y: auto;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .flag {
            font-weight: bold;
        }

        a {
            color: #555;
            font-size: 0.85rem;
        }

        .disconnect-btn {
            font-family: monospace;
            font-size: 0.8rem;
            padding: 0.1rem 0.4rem;
            background: #f5f5f5;
            border: 1px solid #ccc;
            color: #555;
            cursor: pointer;
            margin-left: 0.6rem;
        }

        .disconnect-btn:hover {
            background: #e8e8e8;
            border-color: #aaa;
        }
    </style>
</head>

<body>
    <h1>castzura status</h1>
    <p><a href="/status/raw">[raw json]</a> &nbsp; auto-refresh: 5s</p>
    <h2>Threads</h2>
    <ul>
        <li>ffmpeg: <span class="flag">{{ffmpeg}}</span></li>
        <li>pipewire: <span class="flag">{{pw}}</span></li>
    </ul>
    <h2>Whitelist</h2>
    <ul>{{whitelist_rows}}</ul>
    <h2>Connected clients</h2>
    <ul>{{client_rows}}</ul>
    <h2>Logs (newest first)</h2>
    <div class="log">{{log_rows}}</div>
</body>

</html>
